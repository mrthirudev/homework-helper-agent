<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Buddy — Homework Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FBF7ED;
    --paper-line: #E3DCC8;
    --margin-red: #D9756B;
    --ink: #2A3B4C;
    --ink-soft: #5B6B78;
    --chalkboard: #33473E;
    --chalkboard-dark: #253430;
    --chalk: #F4F7F1;
    --pencil: #F2B134;
    --pencil-dark: #C98F13;
    --coral: #E8735C;
    --shadow: rgba(42, 59, 76, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 24px 16px;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 35px,
      var(--paper-line) 36px
    );
  }

  .app {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 48px);
    background: var(--paper);
    border-radius: 18px;
    box-shadow: 0 12px 32px var(--shadow);
    position: relative;
    overflow: hidden;
    border: 1px solid var(--paper-line);
  }

  /* signature element: the ruled-notebook red margin line */
  .app::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 46px;
    width: 2px;
    background: var(--margin-red);
    opacity: 0.55;
    z-index: 1;
  }

  header {
    background: var(--chalkboard);
    color: var(--chalk);
    padding: 22px 24px 20px 60px;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 1.7rem;
    margin: 0;
    letter-spacing: 0.2px;
  }

  header p {
    margin: 4px 0 0;
    font-size: 0.88rem;
    color: #CFE0D6;
    font-weight: 500;
  }

  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 22px 20px 22px 60px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 2;
    position: relative;
  }

  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.96rem;
    line-height: 1.5;
    animation: rise 0.25s ease-out;
    white-space: pre-wrap;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.buddy {
    align-self: flex-start;
    background: var(--chalkboard);
    color: var(--chalk);
    border-bottom-left-radius: 4px;
  }

  .msg.student {
    align-self: flex-end;
    background: var(--pencil);
    color: #4A3300;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  .msg.system-note {
    align-self: center;
    background: transparent;
    color: var(--ink-soft);
    font-size: 0.82rem;
    font-style: italic;
    max-width: 100%;
    text-align: center;
  }

  .typing {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 14px 16px;
    background: var(--chalkboard);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--chalk);
    opacity: 0.6;
    animation: bounce 1.1s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  form {
    display: flex;
    gap: 10px;
    padding: 16px 20px 18px 60px;
    border-top: 1px solid var(--paper-line);
    background: var(--paper);
    z-index: 2;
    position: relative;
    flex-shrink: 0;
  }

  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--paper-line);
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.96rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }

  input[type="text"]:focus {
    border-color: var(--pencil-dark);
  }

  button {
    background: var(--coral);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 0 22px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 0.96rem;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.15s ease;
  }

  button:hover:not(:disabled) { background: #D9634B; }
  button:active:not(:disabled) { transform: scale(0.96); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .starter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 14px 60px;
    position: relative;
    z-index: 2;
  }

  .starter {
    font-size: 0.8rem;
    background: #fff;
    border: 1.5px solid var(--paper-line);
    color: var(--ink-soft);
    padding: 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .starter:hover {
    border-color: var(--pencil-dark);
    color: var(--ink);
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--paper-line); border-radius: 8px; }

  @media (prefers-reduced-motion: reduce) {
    .msg, .typing span { animation: none; }
  }

  @media (max-width: 480px) {
    .app::before { left: 30px; }
    header, .chat, form, .starter-row { padding-left: 40px; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🖍️ Buddy</h1>
      <p>Your step-by-step homework helper — Grades 1–5</p>
    </header>

    <div class="chat" id="chat">
      <div class="msg system-note">Ask me about your Math, English, or Science homework — I'll help you work through it step by step!</div>
    </div>

    <div class="starter-row" id="starterRow">
      <button class="starter" type="button">3/4 of a pizza minus 1/4?</button>
      <button class="starter" type="button">Noun vs. verb — what's the difference?</button>
      <button class="starter" type="button">What's a food chain?</button>
    </div>

    <form id="chatForm">
      <input type="text" id="messageInput" placeholder="Type your question..." autocomplete="off" />
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>

<script>
  // ⚠️ Replace this with YOUR Cloudflare Worker URL after you deploy it
  // (see DEPLOY.md, Step 2). Example: "https://homework-helper-proxy.yoursubdomain.workers.dev"
  const WORKER_URL = "https://homework-helper-proxy.tthomework.workers.dev";

  const chat = document.getElementById("chat");
  const form = document.getElementById("chatForm");
  const input = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const starterRow = document.getElementById("starterRow");

  let history = []; // { role: "user"|"assistant", content: string }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "student" : "buddy");
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typingIndicator";
    div.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typingIndicator");
    if (el) el.remove();
  }

  async function sendMessage(text) {
    if (!text.trim()) return;

    addMessage("user", text);
    history.push({ role: "user", content: text });

    input.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      const data = await res.json();
      hideTyping();

      if (!res.ok) {
        addMessage("assistant", "Oops! Something went wrong: " + (data.error || "unknown error") + ". Please check the Worker URL and try again.");
        return;
      }

      addMessage("assistant", data.reply);
      history.push({ role: "assistant", content: data.reply });
    } catch (err) {
      hideTyping();
      addMessage("assistant", "I couldn't reach the server. Make sure WORKER_URL in index.html is set correctly, and that the Cloudflare Worker is deployed.");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    sendMessage(input.value);
  });

  starterRow.addEventListener("click", (e) => {
    if (e.target.classList.contains("starter")) {
      sendMessage(e.target.textContent);
    }
  });
</script>
</body>
</html>
